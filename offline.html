<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math-Falta | Offline</title>
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
  <link
    href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap"
    rel="stylesheet"
  />
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <style>
    /* Minimal fallback styling in case CDN assets are unavailable offline */
    body {
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #0f172a;
      margin: 0;
      padding: 0;
    }
    .offline-card {
      max-width: 420px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 15px 40px rgba(79, 70, 229, 0.1);
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 16px;
      border-radius: 9999px;
      border: none;
      background: #4f46e5;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#7C3AED",
            secondary: "#F97316",
            "background-light": "#F8FAFC",
            "background-dark": "#0F172A",
            "surface-light": "#FFFFFF",
            "surface-dark": "#1E293B",
          },
          fontFamily: {
            display: ["Fredoka", "sans-serif"],
            body: ["Inter", "sans-serif"],
          },
        },
      },
    };
  </script>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-800 dark:text-slate-100 font-body">
  <div class="min-h-screen flex flex-col items-center justify-center text-center px-6">
    <div class="offline-card">
      <h1 class="text-4xl font-display font-bold text-primary mb-3">You are Offline</h1>
      <p class="text-lg text-slate-600 dark:text-slate-300 mb-6">
        Content you opened before stays available. Please reconnect to get the latest lessons and quizzes.
      </p>
      <button class="btn" onclick="window.location.reload()">
        <span>Retry Connection</span>
      </button>
    </div>
  </div>
</body>
</html>
